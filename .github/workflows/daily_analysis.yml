name: Daily Market Analysis

on:
  schedule:
    # 台灣時間 18:00 (UTC 10:00) 觸發台股
    - cron: '0 10 * * *'
    # 台灣時間 06:00 (UTC 22:00) 觸發美股
    - cron: '0 22 * * *'
  # 允許手動觸發
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    
    # 給予寫入權限，以便將 report.json push 回 repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Insights Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push report.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/data/report.json
          # 如果沒有變更就不執行 commit 以免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update market insights report" && git push)
