name: Daily Market Analysis

on:
  schedule:
    # GitHub Actions uses UTC. Run at both possible 9am Pacific UTC offsets;
    # main.py gates on America/Los_Angeles so only the correct one sends.
    - cron: '0 16,17 * * *'
  workflow_dispatch:

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    
    # 給予寫入權限，以便將 report.json push 回 repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Insights Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENT_EMAIL: ${{ secrets.NEWSLETTER_RECIPIENT_EMAIL }}
          ENFORCE_LOCAL_HOUR: "true"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py --force
          else
            python main.py
          fi

      - name: Commit and push generated data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/data/report.json history.json
          # 如果沒有變更就不執行 commit 以免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update market insights report" && git push)
